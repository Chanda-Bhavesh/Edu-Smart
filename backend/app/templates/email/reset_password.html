<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h2 style="color: #2563eb;">Reset your SCMS password</h2>
  <p>Hi <strong>{{ full_name }}</strong>,</p>
  <p>We received a request to reset your password. Click the button below to proceed.</p>
  <p style="margin: 30px 0;">
    <a href="{{ reset_url }}"
       style="background-color: #dc2626; color: white; padding: 12px 24px; text-decoration: none; border-radius: 6px;">
      Reset Password
    </a>
  </p>
  <p style="color: #6b7280; font-size: 14px;">This link expires in 15 minutes. If you didn't request this, ignore this email.</p>
</body>
</html>
